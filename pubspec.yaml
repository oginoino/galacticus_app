name: galacticus_app
description: "Galacticus é um Social Sports Hub. Estrutura base em Flutter para o protótipo do Galácticos Club"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.1
  flutter_animate: ^4.5.2
  cached_network_image: ^3.4.1
  provider: ^6.1.5+1
  get_it: ^9.2.0
  shared_preferences: ^2.5.4
  go_router: ^17.1.0
  http: ^1.2.2
  intl: ^0.20.2
  camera: ^0.11.2
  fl_chart: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/png/
    - assets/images/prototype/
    - assets/data/
