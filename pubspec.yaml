name: galacticus_app
description: "Galacticus é um Social Sports Hub. Estrutura base em Flutter para o protótipo do Galácticos Club"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.1
  flutter_animate: ^4.5.2
  cached_network_image: ^3.4.1
  provider: ^6.1.5+1
  get_it: ^9.2.0
  shared_preferences: ^2.5.4
  go_router: ^17.1.0
  http: ^1.2.2
  intl: ^0.20.2
  camera: ^0.11.2
  fl_chart: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/png/
    - assets/images/prototype/
    - assets/data/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/prototype/logo-galacticos.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  background_color_ios: "#050708"
  adaptive_icon_background: "#050708"
  adaptive_icon_foreground: "assets/images/prototype/logo-galacticos.png"
  web:
    generate: true
    image_path: "assets/images/prototype/logo-galacticos.png"
    background_color: "#050708"
    theme_color: "#B7F36B"
  macos:
    generate: true
    image_path: "assets/images/prototype/logo-galacticos.png"

flutter_native_splash:
  color: "#050708"
  color_dark: "#050708"
  image: "assets/images/prototype/logo-galacticos.png"
  image_dark: "assets/images/prototype/logo-galacticos.png"
  android_12:
    color: "#050708"
    color_dark: "#050708"
    image: "assets/images/prototype/logo-galacticos.png"
    image_dark: "assets/images/prototype/logo-galacticos.png"
    icon_background_color: "#050708"
    icon_background_color_dark: "#050708"
  android: true
  ios: true
  web: true
  fullscreen: false
